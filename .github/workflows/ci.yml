          test_wheel open3d*-"$pi_tag"-*_$(uname -m).whl
      - name: Run Python unit tests
        run: |
          source util/ci_utils.sh
          echo "Running Open3D python tests..."
          run_python_tests

  # ============================================================
  # DOCUMENTATION BUILD
  # ============================================================
  build-docs:
    name: Build Documentation
    needs: [linux-cpu-build-lib]
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest
    env:
      DEVELOPER_BUILD: ${{ env.DEVELOPER_BUILD }}
    steps:
      - name: Checkout Open3D source code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: open3d-wheel-linux-x86_64-cpu
      - name: Checkout Open3D-ML
        run: git clone --depth 1 https://github.com/isl-org/Open3D-ML.git -b main /tmp/Open3D-ML
      - name: Install doc dependencies
        run: |
          source util/ci_utils.sh
          install_docs_dependencies /tmp/Open3D-ML
      - name: Install Open3D wheel
        run: python -m pip install open3d*.whl
      - name: Build docs
        run: |
          source util/ci_utils.sh
          build_docs "${DEVELOPER_BUILD}"
          tar -C docs/_out -czvf open3d-${GITHUB_SHA}-docs.tar.gz html
      - name: Generate docs attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/open3d-${{ github.sha }}-docs.tar.gz
      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: open3d-${{ github.sha }}-docs
          path: open3d-${{ github.sha }}-docs.tar.gz
          if-no-files-found: error
          compression-level: 0
      - name: Update devel release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .github/workflows/update_release.sh open3d-${{ github.sha }}-docs.tar.gz

  # ============================================================
  # WHEEL UPLOAD TO PYPI (Manual trigger only)
  # ============================================================
  upload-wheels-to-pypi:
    name: Upload Wheels to PyPI
    if: ${{ github.ref == 'refs/heads/main' && env.UPLOAD_WHEELS == 'true' }}
    needs:
      - linux-cuda-build-wheel
      - linux-cpu-build-lib
      - linux-arm64-build-wheel
      - linux-sycl-build-wheel
      - windows-build-wheel
      - macos-build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: open3d-*.whl
          merge-multiple: true
          path: dist
      - name: List wheels
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://upload.pypi.org/legacy/

  # ============================================================
  # CLEAN GCLOUD PROFILES (Manual trigger only)
  # ============================================================
  clean-gcloud-profiles:
    name: Clean GCloud Profiles
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GCE_GPU_CI_SA: ${{ secrets.GCE_GPU_CI_SA }}
      GCE_CLI_GHA_VERSION: '416.0.0'
    steps:
      - name: GCloud CLI auth
        uses: 'google-github-actions/auth@v2'
        with:
          project_id: ${{ secrets.GCE_PROJECT }}
          credentials_json: '${{ secrets.GCE_SA_KEY_GPU_CI }}'
      - name: GCloud CLI setup
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: ${{ env.GCE_CLI_GHA_VERSION }}
          project_id: ${{ secrets.GCE_PROJECT }}
      - name: Delete GCloud login profiles manually
        run: |
          gcloud compute os-login describe-profile
          for i in $(gcloud compute os-login ssh-keys list | grep -v FINGERPRINT); do
              echo "Removing ssh key"
              gcloud compute os-login ssh-keys remove --key $i || true
          done
          gcloud compute os-login describe-profile
