name: Open3D CI

on:
  workflow_dispatch:
    inputs:
      developer_build:
        description: 'Set to OFF for Release builds'
        required: false
        default: 'ON'
      python_versions:
        description: 'Python versions to test (comma-separated)'
        required: false
        default: '3.10,3.11,3.12,3.13,3.14'
      build_cuda:
        description: 'Build with CUDA support'
        type: boolean
        required: false
        default: true
      build_cpu:
        description: 'Build CPU-only variant'
        type: boolean
        required: false
        default: true
      build_sycl:
        description: 'Build with SYCL support'
        type: boolean
        required: false
        default: false
      build_openblas:
        description: 'Build with OpenBLAS (ARM64)'
        type: boolean
        required: false
        default: false
      upload_wheels:
        description: 'Upload wheels to PyPI (main branch only)'
        type: boolean
        required: false
        default: false
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  schedule:
    - cron: '0 2 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  PYTHON_VERSIONS: ${{ github.event.inputs.python_versions || '3.10,3.11,3.12,3.13,3.14' }}
  DEVELOPER_BUILD: ${{ github.event.inputs.developer_build || 'ON' }}
  BUILD_CUDA: ${{ github.event.inputs.build_cuda || 'true' }}
  BUILD_CPU: ${{ github.event.inputs.build_cpu || 'true' }}
  BUILD_SYCL: ${{ github.event.inputs.build_sycl || 'false' }}
  BUILD_OPENBLAS: ${{ github.event.inputs.build_openblas || 'false' }}
  UPLOAD_WHEELS: ${{ github.event.inputs.upload_wheels || 'false' }}
  BUILD_SHARED_LIBS: ON
  BUILD_TENSORFLOW_OPS: ON
  BUILD_PYTORCH_OPS: ON
  CUDA_DOCKER_IMAGE: nvidia/cuda:12.6.0-devel-ubuntu22.04
  CPU_DOCKER_IMAGE: ubuntu:22.04
  ARM64_DOCKER_IMAGE: ubuntu:24.04
  SYCL_DOCKER_IMAGE: intel/oneapi-basekit:2024.2-devel-ubuntu22.04
  CCACHE_DIR: /tmp/ccache

jobs:
  # ============================================================
  # STYLE CHECK
  # ============================================================
  style-check:
    name: Style Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install style dependencies
        run: pip install -U -r python/requirements_style.txt
      - name: Run style check
        run: python util/check_style.py

  # ============================================================
  # VTK PACKAGES
  # ============================================================
  vtk-packages:
    name: VTK Packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name_suffix: linux
          - os: windows-2022
            name_suffix: windows
          - os: macos-14
            name_suffix: macos
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: CMake configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir build
          cd build
          cmake ../3rdparty/vtk
      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd build
          make -j$(nproc)
          cmake -E sha256sum vtk*.tar.gz > checksum_${{ matrix.name_suffix }}.txt
      - name: Upload artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vtk_${{ matrix.name_suffix }}
          path: |
            build/vtk*.tar.gz
            build/checksum*.txt
          if-no-files-found: error

      - name: Disk space used (Windows)
        if: runner.os == 'Windows'
        run: Get-PSDrive
      - name: Config (Windows)
        if: runner.os == 'Windows'
        env:
          SRC_DIR: "D:\\a\\open3d\\open3d"
          BUILD_DIR: "C:\\Open3D\\build"
          NPROC: 6
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -Path ${{ env.BUILD_DIR }} -ItemType Directory -Force
          cd ${{ env.BUILD_DIR }}
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_INSTALL_PREFIX="C:\Program Files\Open3D" `
            -DSTATIC_WINDOWS_RUNTIME=ON `
            "${{ env.SRC_DIR }}\3rdparty\vtk"
          ls
      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: C:\Open3D\build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --build . --parallel ${{ env.NPROC }} --config Release
          ls
          cmake --build . --parallel ${{ env.NPROC }} --config Debug
          ls
          cmake -E sha256sum (get-item vtk*.tar.gz).Name > checksum_win.txt
      - name: Upload package (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vtk_windows
          path: |
            C:\Open3D\build\vtk*.tar.gz
            C:\Open3D\build\checksum*.txt
          if-no-files-found: error

  # ============================================================
  # WEBRTC PACKAGES
  # ============================================================
  webrtc-packages:
    name: WebRTC Packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            suffix: linux_cxx-abi-1
          - os: macos-14
            suffix: macos_arm64
          - os: windows-2022
            config: Release
            static_runtime: ON
            tag: Release_mt
          - os: windows-2022
            config: Release
            static_runtime: OFF
            tag: Release_md
          - os: windows-2022
            config: Debug
            static_runtime: ON
            tag: Debug_mt
          - os: windows-2022
            config: Debug
            static_runtime: OFF
            tag: Debug_md
    env:
      WEBRTC_COMMIT: e8b4d4c5952a8fb7b35c2a6cba4e8c3de2ea2e1e
      DEPOT_TOOLS_COMMIT: 10eda50a3fd9c34ad8d31ec74e5f4eb5823d60f6
      WEBRTC_WORK_ROOT: ${{ github.workspace }}/..
      GCLIENT_JOBS: 8
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          source 3rdparty/webrtc/webrtc_build.sh
          install_dependencies_ubuntu

      - name: Download WebRTC sources
        run: |
          source 3rdparty/webrtc/webrtc_build.sh
          download_webrtc_sources

      - name: Build WebRTC (Unix)
        if: runner.os != 'Windows'
        run: |
          source 3rdparty/webrtc/webrtc_build.sh
          build_webrtc

      - name: Upload WebRTC (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: webrtc_${{ matrix.suffix }}
          path: |
            webrtc_*.tar.gz
            checksum_webrtc_*.tar.gz
          if-no-files-found: error

      # Windows-specific steps
      - name: Prepare work directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WORK_DIR: 'C:\WebRTC'
          OPEN3D_DIR: ${{ github.workspace }}
          WEBRTC_WORK_ROOT: 'C:\WebRTC'
          DEPOT_TOOLS_UPDATE: 0
          DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        run: |
          Get-PSDrive
          New-Item -ItemType Directory -Force -Path $env:WORK_DIR

      - name: Setup PATH for Visual Studio (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download WebRTC sources (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          OPEN3D_DIR: ${{ github.workspace }}
        run: |
          source "$OPEN3D_DIR/3rdparty/webrtc/webrtc_build.sh"
          download_webrtc_sources

      - name: Patch WebRTC (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: C:\WebRTC
        env:
          OPEN3D_DIR: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = 'Stop'
          Copy-Item "$env:OPEN3D_DIR/3rdparty/webrtc/CMakeLists.txt" webrtc/
          Copy-Item "$env:OPEN3D_DIR/3rdparty/webrtc/webrtc_common.cmake" webrtc/
          bash "$env:OPEN3D_DIR/3rdparty/webrtc/apply_webrtc_patches.sh" `
            "$env:OPEN3D_DIR" "$env:WORK_DIR/webrtc/src"

      - name: Build and package WebRTC (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: C:\WebRTC
        env:
          BUILD_CONFIG: ${{ matrix.config }}
          STATIC_RT: ${{ matrix.static_runtime }}
          WIN_TAG: ${{ matrix.tag }}
          OPEN3D_DIR: ${{ github.workspace }}
          WORK_DIR: 'C:\WebRTC'
        run: |
          $ErrorActionPreference = 'Stop'
          $ninjaExe = (Get-Command ninja.exe -ErrorAction Stop).Source
          $env:Path = (Get-Item depot_tools).FullName + ';' + $env:Path
          $installRoot = Join-Path $env:WORK_DIR "webrtc_pkg"
          if (Test-Path $installRoot) { Remove-Item -Recurse -Force $installRoot }
          New-Item -ItemType Directory -Force -Path webrtc/build | Out-Null
          Push-Location webrtc/build
          $debugFlag = if ($env:BUILD_CONFIG -eq 'Debug') { 'ON' } else { 'OFF' }
          cmake -G Ninja `
            -D CMAKE_MAKE_PROGRAM="$ninjaExe" `
            -D CMAKE_BUILD_TYPE=$env:BUILD_CONFIG `
            -D WEBRTC_IS_DEBUG=$debugFlag `
            -D WEBRTC_STATIC_MSVC_RUNTIME=$env:STATIC_RT `
            -D CMAKE_INSTALL_PREFIX=$installRoot `
            ..
          ninja install
          Pop-Location
          $short = (git -C webrtc/src rev-parse --short=7 HEAD)
          $zip = "webrtc_${short}_win_$env:WIN_TAG.zip"
          Push-Location $installRoot
          cmake -E tar cvf (Join-Path $env:OPEN3D_DIR $zip) --format=zip .
          Pop-Location
          cmake -E sha256sum (Join-Path $env:OPEN3D_DIR $zip) | Tee-Object -FilePath (Join-Path $env:OPEN3D_DIR "checksum_$zip")

      - name: Upload WebRTC (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: webrtc_win_${{ matrix.tag }}
          path: |
            webrtc_*_win_*.zip
            checksum_webrtc_*_win_*.zip
          if-no-files-found: error

  # ============================================================
  # LINUX x86_64 CUDA BUILD
  # ============================================================
  linux-cuda-build-lib:
    name: Linux CUDA Build Lib
    if: ${{ env.BUILD_CUDA == 'true' }}
    runs-on: ubuntu-latest
    env:
      BUILD_CUDA_MODULE: ON
      BUILD_CPU_RENDERING: true
      BUILD_PYTORCH_OPS: OFF
      BUILD_TENSORFLOW_OPS: OFF
      OPEN3D_CPU_RENDERING: true
      DEVELOPER_BUILD: ${{ env.DEVELOPER_BUILD }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Maximize build space
        run: |
          source util/ci_utils.sh
          maximize_ubuntu_github_actions_build_space
      - name: Docker build CUDA lib packages
        run: |
          docker/docker_build.sh cuda_wheel_py312_dev build-lib
          ls -lh open3d-devel-*.tar.xz open3d-viewer-*.deb open3d-cpp-tests.tar.xz
      - name: Upload devel packages
        uses: actions/upload-artifact@v4
        with:
          name: open3d-devel-packages-cuda
          path: |
            open3d-devel-*.tar.xz
            open3d-viewer-*.deb
          if-no-files-found: error
      - name: Upload C++ tests bundle
        uses: actions/upload-artifact@v4
        with:
          name: open3d-cpp-tests-cuda
          path: open3d-cpp-tests.tar.xz
          if-no-files-found: error
          retention-days: 1

  linux-cuda-test-cpp:
    name: Linux CUDA Test C++
    if: ${{ env.BUILD_CUDA == 'true' }}
    runs-on: ubuntu-22.04
    needs: [linux-cuda-build-lib]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Download C++ tests bundle
        uses: actions/download-artifact@v4
        with:
          name: open3d-cpp-tests-cuda
          path: .
      - name: Install runtime dependencies
        run: sudo apt-get update && sudo apt-get install --yes libegl1
      - name: Run C++ unit tests
        run: |
          source util/ci_utils.sh
          run_cpp_tests_from_bundle open3d-cpp-tests.tar.xz

  linux-cuda-build-wheel:
    name: Linux CUDA Build Wheel
    if: ${{ env.BUILD_CUDA == 'true' }}
    needs: [linux-cuda-build-lib]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: [3.10, 3.11, 3.12, 3.13, 3.14]
        is_main:
          - ${{ github.ref == 'refs/heads/main' }}
        exclude:
          - is_main: false
            python_version: '3.10'
          - is_main: false
            python_version: '3.11'
          - is_main: false
            python_version: '3.12'
          - is_main: false
            python_version: '3.13'
    env:
      PYTHON_VERSION: ${{ matrix.python_version }}
      DEVELOPER_BUILD: ${{ env.DEVELOPER_BUILD }}
      BUILD_PYTORCH_OPS: ON
      BUILD_TENSORFLOW_OPS: ${{ matrix.python_version >= '3.14' && 'OFF' || 'ON' }}
      CCACHE_TAR_NAME: open3d-ubuntu-2204-cuda-ci-ccache
      OPEN3D_CPU_RENDERING: true
      BUILD_CUDA_MODULE: ON
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Maximize build space
        run: |
          source util/ci_utils.sh
          maximize_ubuntu_github_actions_build_space
      - name: Download devel packages
        uses: actions/download-artifact@v4
        with:
          name: open3d-devel-packages-cuda
          path: open3d-artifacts
      - name: List devel artifacts
        run: ls -lh open3d-artifacts/
      - name: Docker build wheel
        run: |
          export OPEN3D_ARTIFACTS_DIR="${GITHUB_WORKSPACE}/open3d-artifacts"
          PY_VER="${{ env.PYTHON_VERSION }}"
          DEV_BUILD="${{ env.DEVELOPER_BUILD }}"
          if [ "$PY_VER" = "3.10" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh cuda_wheel_py310_dev
          elif [ "$PY_VER" = "3.11" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh cuda_wheel_py311_dev
          elif [ "$PY_VER" = "3.12" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh cuda_wheel_py312_dev
          elif [ "$PY_VER" = "3.13" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh cuda_wheel_py313_dev
          elif [ "$PY_VER" = "3.14" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh cuda_wheel_py314_dev
          elif [ "$PY_VER" = "3.10" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh cuda_wheel_py310
          elif [ "$PY_VER" = "3.11" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh cuda_wheel_py311
          elif [ "$PY_VER" = "3.12" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh cuda_wheel_py312
          elif [ "$PY_VER" = "3.13" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh cuda_wheel_py313
          elif [ "$PY_VER" = "3.14" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh cuda_wheel_py314
          fi
          shopt -s failglob
          PIP_PKG_NAME="$(basename ${GITHUB_WORKSPACE}/open3d-[0-9]*.whl)"
          PIP_CPU_PKG_NAME="$(basename ${GITHUB_WORKSPACE}/open3d_cpu*.whl)"
          echo "PIP_PKG_NAME=$PIP_PKG_NAME" >> $GITHUB_ENV
          echo "PIP_CPU_PKG_NAME=$PIP_CPU_PKG_NAME" >> $GITHUB_ENV
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ github.workspace }}/${{ env.PIP_PKG_NAME }}
            ${{ github.workspace }}/${{ env.PIP_CPU_PKG_NAME }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PIP_PKG_NAME }}
          path: |
            ${{ env.PIP_PKG_NAME }}
            ${{ env.PIP_CPU_PKG_NAME }}
          if-no-files-found: error
      - name: Update devel release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .github/workflows/update_release.sh ${GITHUB_WORKSPACE}/${{ env.PIP_PKG_NAME }} \
          ${GITHUB_WORKSPACE}/${{ env.PIP_CPU_PKG_NAME }}

  linux-cuda-test-wheel:
    name: Linux CUDA Test Wheel
    if: ${{ env.BUILD_CUDA == 'true' }}
    needs: [linux-cuda-build-wheel]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: [3.10, 3.11, 3.12, 3.13, 3.14]
        is_main:
          - ${{ github.ref == 'refs/heads/main' }}
        exclude:
          - is_main: false
            python_version: '3.10'
          - is_main: false
            python_version: '3.11'
          - is_main: false
            python_version: '3.12'
          - is_main: false
            python_version: '3.13'
    env:
      BUILD_PYTORCH_OPS: ON
      BUILD_TENSORFLOW_OPS: ${{ matrix.python_version >= '3.14' && 'OFF' || 'ON' }}
      OPEN3D_ML_ROOT: ${{ github.workspace }}/Open3D-ML
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Checkout Open3D-ML
        uses: actions/checkout@v4
        with:
          repository: isl-org/Open3D-ML
          ref: main
          path: ${{ env.OPEN3D_ML_ROOT }}
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: open3d-*linux*.whl
          merge-multiple: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
      - name: Test Python package
        run: |
          python -V
          source util/ci_utils.sh
          pi_tag=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          test_wheel open3d*-"$pi_tag"-*_$(uname -m).whl
      - name: Run Python unit tests
        run: |
          source util/ci_utils.sh
          echo "Running Open3D python tests..."
          run_python_tests

  # ============================================================
  # LINUX x86_64 CPU-ONLY BUILD
  # ============================================================
  linux-cpu-build-lib:
    name: Linux CPU Build Lib
    if: ${{ env.BUILD_CPU == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        BUILD_SHARED_LIBS: [ON, OFF]
    env:
      BUILD_SHARED_LIBS: ${{ matrix.BUILD_SHARED_LIBS }}
      MLOPS: ${{ matrix.BUILD_SHARED_LIBS }}
      BUILD_CUDA_MODULE: OFF
      DEVELOPER_BUILD: ${{ env.DEVELOPER_BUILD }}
      OPEN3D_CPU_RENDERING: true
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Maximize build space
        run: |
          source util/ci_utils.sh
          maximize_ubuntu_github_actions_build_space
      - name: Docker build CPU lib packages
        run: |
          if [ "${{ matrix.BUILD_SHARED_LIBS }}" = "OFF" ] && [ "${{ env.MLOPS }}" = "OFF" ] && [ "${{ env.DEVELOPER_BUILD }}" = "ON" ]; then
            docker/docker_build.sh cpu-static
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "OFF" ] && [ "${{ env.MLOPS }}" = "OFF" ] && [ "${{ env.DEVELOPER_BUILD }}" = "OFF" ]; then
            docker/docker_build.sh cpu-static-release
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "ON"  ] && [ "${{ env.MLOPS }}" = "ON"  ] && [ "${{ env.DEVELOPER_BUILD }}" = "ON"  ]; then
            docker/docker_build.sh cpu-shared-ml
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "ON"  ] && [ "${{ env.MLOPS }}" = "ON"  ] && [ "${{ env.DEVELOPER_BUILD }}" = "OFF" ]; then
            docker/docker_build.sh cpu-shared-ml-release
          fi
      - name: Docker test
        run: |
          if [ "${{ matrix.BUILD_SHARED_LIBS }}" = "OFF" ] && [ "${{ env.MLOPS }}" = "OFF" ] && [ "${{ env.DEVELOPER_BUILD }}" = "ON" ]; then
            docker/docker_test.sh cpu-static
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "OFF" ] && [ "${{ env.MLOPS }}" = "OFF" ] && [ "${{ env.DEVELOPER_BUILD }}" = "OFF" ]; then
            docker/docker_test.sh cpu-static-release
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "ON"  ] && [ "${{ env.MLOPS }}" = "ON"  ] && [ "${{ env.DEVELOPER_BUILD }}" = "ON"  ]; then
            docker/docker_test.sh cpu-shared-ml
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "ON"  ] && [ "${{ env.MLOPS }}" = "ON"  ] && [ "${{ env.DEVELOPER_BUILD }}" = "OFF" ]; then
            docker/docker_test.sh cpu-shared-ml-release
          fi
      - name: Generate package attestation
        if: ${{ matrix.BUILD_SHARED_LIBS == 'ON' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/open3d-devel-*.tar.xz
      - name: Upload package to GitHub artifacts
        if: ${{ matrix.BUILD_SHARED_LIBS == 'ON' }}
        uses: actions/upload-artifact@v4
        with:
          name: open3d-devel-linux-x86_64-cpu
          path: open3d-devel-*.tar.xz
          if-no-files-found: error
      - name: Upload wheel to GitHub artifacts
        if: ${{ matrix.BUILD_SHARED_LIBS == 'ON' }}
        uses: actions/upload-artifact@v4
        with:
          name: open3d-wheel-linux-x86_64-cpu
          path: open3d*.whl
          if-no-files-found: error
      - name: Generate viewer attestation
        if: ${{ matrix.BUILD_SHARED_LIBS == 'OFF' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/open3d-viewer-*-Linux.deb
      - name: Upload viewer to GitHub artifacts
        if: ${{ matrix.BUILD_SHARED_LIBS == 'OFF' }}
        uses: actions/upload-artifact@v4
        with:
          name: open3d-viewer-Linux-cpu
          path: open3d-viewer-*-Linux.deb
          if-no-files-found: error
      - name: Update devel release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ${{ env.BUILD_SHARED_LIBS }} == 'ON' ] ; then
            .github/workflows/update_release.sh open3d-devel-*.tar.xz
          else
            .github/workflows/update_release.sh open3d-viewer-*-Linux.deb
          fi

  # ============================================================
  # LINUX ARM64 OPENBLAS BUILD
  # ============================================================
  linux-arm64-build-lib:
    name: Linux ARM64 Build Lib
    if: ${{ env.BUILD_OPENBLAS == 'true' }}
    runs-on: ubuntu-latest
    env:
      BUILD_CUDA_MODULE: OFF
      DEVELOPER_BUILD: ${{ env.DEVELOPER_BUILD }}
      OPEN3D_CPU_RENDERING: true
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Maximize build space
        run: |
          source util/ci_utils.sh
          maximize_ubuntu_github_actions_build_space
      - name: Docker build ARM64 OpenBLAS
        run: |
          docker/docker_build.sh openblas_dev build-lib
          ls -lh open3d-devel-*.tar.xz open3d-viewer-*.deb
      - name: Upload devel packages
        uses: actions/upload-artifact@v4
        with:
          name: open3d-devel-packages-arm64
          path: |
            open3d-devel-*.tar.xz
            open3d-viewer-*.deb
          if-no-files-found: error

  linux-arm64-build-wheel:
    name: Linux ARM64 Build Wheel
    if: ${{ env.BUILD_OPENBLAS == 'true' }}
    needs: [linux-arm64-build-lib]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: [3.10, 3.11, 3.12, 3.13, 3.14]
        is_main:
          - ${{ github.ref == 'refs/heads/main' }}
        exclude:
          - is_main: false
            python_version: '3.10'
          - is_main: false
            python_version: '3.11'
          - is_main: false
            python_version: '3.12'
          - is_main: false
            python_version: '3.13'
    env:
      PYTHON_VERSION: ${{ matrix.python_version }}
      DEVELOPER_BUILD: ${{ env.DEVELOPER_BUILD }}
      BUILD_PYTORCH_OPS: ON
      BUILD_TENSORFLOW_OPS: ${{ matrix.python_version >= '3.14' && 'OFF' || 'ON' }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Maximize build space
        run: |
          source util/ci_utils.sh
          maximize_ubuntu_github_actions_build_space
      - name: Download devel packages
        uses: actions/download-artifact@v4
        with:
          name: open3d-devel-packages-arm64
          path: open3d-artifacts
      - name: Docker build ARM64 wheel
        run: |
          export OPEN3D_ARTIFACTS_DIR="${GITHUB_WORKSPACE}/open3d-artifacts"
          PY_VER="${{ env.PYTHON_VERSION }}"
          DEV_BUILD="${{ env.DEVELOPER_BUILD }}"
          if [ "$PY_VER" = "3.10" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh openblas_wheel_py310_dev
          elif [ "$PY_VER" = "3.11" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh openblas_wheel_py311_dev
          elif [ "$PY_VER" = "3.12" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh openblas_wheel_py312_dev
          elif [ "$PY_VER" = "3.13" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh openblas_wheel_py313_dev
          elif [ "$PY_VER" = "3.14" ] && [ "$DEV_BUILD" = "ON" ]; then
            docker/docker_build.sh openblas_wheel_py314_dev
          elif [ "$PY_VER" = "3.10" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh openblas_wheel_py310
          elif [ "$PY_VER" = "3.11" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh openblas_wheel_py311
          elif [ "$PY_VER" = "3.12" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh openblas_wheel_py312
          elif [ "$PY_VER" = "3.13" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh openblas_wheel_py313
          elif [ "$PY_VER" = "3.14" ] && [ "$DEV_BUILD" = "OFF" ]; then
            docker/docker_build.sh openblas_wheel_py314
          fi
          shopt -s failglob
          PIP_PKG_NAME="$(basename ${GITHUB_WORKSPACE}/open3d-[0-9]*.whl)"
          echo "PIP_PKG_NAME=$PIP_PKG_NAME" >> $GITHUB_ENV
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/${{ env.PIP_PKG_NAME }}
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PIP_PKG_NAME }}
          path: ${{ env.PIP_PKG_NAME }}
          if-no-files-found: error
      - name: Update devel release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .github/workflows/update_release.sh ${GITHUB_WORKSPACE}/${{ env.PIP_PKG_NAME }}

