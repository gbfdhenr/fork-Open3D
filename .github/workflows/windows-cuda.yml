# Windows x64 CUDA Release Wheel
name: "Windows x64 CUDA Release Wheel"

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to build'
        required: false
        type: string
      cuda_version:
        description: 'CUDA version'
        required: false
        type: string
      build_type:
        description: 'Build type'
        required: false
        type: choice
        options: [Release, Debug]
        default: 'Release'
  push:
    branches: [main]
    paths:
      - 'cpp/**'
      - 'python/**'
      - 'cpp/pybind/**'
      - '3rdparty/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows-cuda.yml'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read
  packages: write

env:
  DEVELOPER_BUILD: "OFF"
  BUILD_CUDA_MODULE: "ON"
  BUILD_COMMON_CUDA_ARCHS: "ON"
  BUILD_SHARED_LIBS: "ON"
  BUILD_PYTHON_MODULE: "ON"
  BUILD_EXAMPLES: "OFF"
  BUILD_UNIT_TESTS: "OFF"
  BUILD_BENCHMARKS: "OFF"
  BUILD_GUI: "ON"
  BUILD_WEBRTC: "OFF"
  BUILD_JUPYTER_EXTENSION: "OFF"
  BUILD_TENSORFLOW_OPS: "OFF"
  BUILD_PYTORCH_OPS: "OFF"
  BUNDLE_OPEN3D_ML: "OFF"
  USE_BLAS: "OFF"
  USE_SYSTEM_BLAS: "OFF"
  STATIC_WINDOWS_RUNTIME: "OFF"
  CUDA_VERSION: "12.4"
  PYTHON_VERSIONS: "3.10 3.11 3.12 3.13 3.14"
  BUILD_TYPE: "Release"

jobs:
  windows-cuda-build:
    name: "windows-x64-cuda-${{ matrix.python_version }}"
    runs-on: windows-2022
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        python_version: [3.14]
    env:
      CMAKE_GENERATOR: "Ninja"
      CUDA_VERSION: "12.4"
      CUDA_PATH: "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v12.4"
      # Python installed by Chocolatey to hosted tool cache
      Python_ROOT_DIR: "C:/hostedtoolcache/windows/Python/${{ matrix.python_version }}/x64"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Python via Chocolatey
        run: |
          choco install python314 --no-progress -y
          # Python installs to C:\hostedtoolcache\windows\Python\X.Y.Z\x64
          # Use the hosted tool cache path

      - name: Add Python to PATH
        run: |
          $pythonPath = "C:/hostedtoolcache/windows/Python/${{ matrix.python_version }}/x64"
          echo "$pythonPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$pythonPath/Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Python
        run: |
          python --version
          pip --version

      - name: Setup CUDA ${{ env.CUDA_VERSION }}
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.4.0"

      - name: Install Vulkan SDK
        run: |
          choco install vulkan-sdk --pre --no-progress -y
          $vulkanPath = Get-ChildItem "C:/VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $env:VULKAN_SDK = $vulkanPath.FullName
          echo "VULKAN_SDK=$env:VULKAN_SDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$env:VULKAN_SDK/Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Visual Studio Build Tools (for cl.exe)
        run: |
          choco install visualstudio2022buildtools --no-progress -y --package-parameters "--add Microsoft.VisualStudio.Workload.NativeDesktop --includeRecommended"
          # Find MSVC installation path dynamically (handles both Program Files and Program Files (x86))
          $vsInstallDir = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools"
          if (-not (Test-Path $vsInstallDir)) {
            $vsInstallDir = "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools"
          }
          $msvcPath = Join-Path $vsInstallDir "VC\Tools\MSVC"
          if (Test-Path $msvcPath) {
            $latest = Get-ChildItem $msvcPath -Directory | Sort-Object Name -Descending | Select-Object -First 1
            $vcvars = Join-Path $latest.FullName "bin\Hostx64\x64"
            if (Test-Path $vcvars) {
              echo "$vcvars" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Write-Host "Added MSVC to PATH: $vcvars"
            } else {
              Write-Error "MSVC bin directory not found: $vcvars"
              exit 1
            }
          } else {
            Write-Error "MSVC path not found: $msvcPath"
            Get-ChildItem $vsInstallDir -Recurse -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -eq "MSVC" } | ForEach-Object { Write-Host "Found MSVC at: $($_.FullName)" }
            exit 1
          }

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build
            ${{ env.CUDA_PATH }}
          key: ${{ runner.os }}-cuda-${{ env.CUDA_VERSION }}-${{ matrix.python_version }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r python/requirements.txt
          pip install -r python/requirements_test.txt
          pip install wheel setuptools_scm ninja

      - name: Configure CMake
        run: |
          cmake -S . -B build `
            -G "${{ env.CMAKE_GENERATOR }}" `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX=install `
            -DDEVELOPER_BUILD=${{ env.DEVELOPER_BUILD }} `
            -DBUILD_CUDA_MODULE=${{ env.BUILD_CUDA_MODULE }} `
            -DBUILD_COMMON_CUDA_ARCHS=${{ env.BUILD_COMMON_CUDA_ARCHS }} `
            -DBUILD_SHARED_LIBS=${{ env.BUILD_SHARED_LIBS }} `
            -DBUILD_PYTHON_MODULE=${{ env.BUILD_PYTHON_MODULE }} `
            -DBUILD_EXAMPLES=${{ env.BUILD_EXAMPLES }} `
            -DBUILD_UNIT_TESTS=${{ env.BUILD_UNIT_TESTS }} `
            -DBUILD_BENCHMARKS=${{ env.BUILD_BENCHMARKS }} `
            -DBUILD_GUI=${{ env.BUILD_GUI }} `
            -DBUILD_WEBRTC=${{ env.BUILD_WEBRTC }} `
            -DBUILD_JUPYTER_EXTENSION=${{ env.BUILD_JUPYTER_EXTENSION }} `
            -DBUILD_TENSORFLOW_OPS=${{ env.BUILD_TENSORFLOW_OPS }} `
            -DBUILD_PYTORCH_OPS=${{ env.BUILD_PYTORCH_OPS }} `
            -DBUNDLE_OPEN3D_ML=${{ env.BUNDLE_OPEN3D_ML }} `
            -DUSE_BLAS=${{ env.USE_BLAS }} `
            -DUSE_SYSTEM_BLAS=${{ env.USE_SYSTEM_BLAS }} `
            -DSTATIC_WINDOWS_RUNTIME=${{ env.STATIC_WINDOWS_RUNTIME }} `
            -DPython3_ROOT_DIR="${{ env.Python_ROOT_DIR }}" `
            -DPython3_FIND_REGISTRY=NEVER `
            -DCUDA_TOOLKIT_ROOT_DIR="${{ env.CUDA_PATH }}"

      - name: Build Open3D (Core + Python Module)
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --target pybind -- -j4

      - name: Build Python Wheel
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --target pip-package -- -j4
        env:
          PYTHON_EXECUTABLE: ${{ env.Python_ROOT_DIR }}/python.exe

      - name: Verify wheel
        run: |
          $wheel = Get-ChildItem build/lib/python_package/pip_package/*.whl
          Write-Host "Found wheel: $($wheel.Name)"
          python -m pip install --dry-run $wheel.FullName

      - name: Test wheel installation
        run: |
          $wheel = Get-ChildItem build/lib/python_package/pip_package/*.whl
          pip install $wheel.FullName
          python -c "import open3d as o3d; print('Open3D version:', o3d.__version__); print('CUDA available:', o3d.core.cuda.is_available())"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: open3d-wheel-windows-x64-cuda-${{ matrix.python_version }}-${{ env.CUDA_VERSION }}
          path: build/lib/python_package/pip_package/*.whl
          retention-days: 30
          if-no-files-found: error

  release-wheels:
    name: "Release Wheels"
    needs: windows-cuda-build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: open3d-wheel-windows-x64-cuda-*
          merge-multiple: true

      - name: List wheels
        run: find wheels -name "*.whl" -type f | sort

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: wheels/*.whl
          generate_release_notes: true
          draft: false
          prerelease: false
