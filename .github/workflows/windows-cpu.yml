# Windows x64 CPU Release Wheel
name: "Windows x64 CPU Release Wheel"

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to build'
        required: false
        type: string
      build_type:
        description: 'Build type'
        required: false
        type: choice
        options: [Release, Debug]
        default: 'Release'
  push:
    branches: [main]
    paths:
      - 'cpp/**'
      - 'python/**'
      - 'cpp/pybind/**'
      - '3rdparty/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows-cpu.yml'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 */2 * *'

permissions:
  contents: read
  packages: write

env:
  DEVELOPER_BUILD: "OFF"
  BUILD_CUDA_MODULE: "OFF"
  BUILD_COMMON_CUDA_ARCHS: "OFF"
  BUILD_SHARED_LIBS: "ON"
  BUILD_PYTHON_MODULE: "ON"
  BUILD_EXAMPLES: "OFF"
  BUILD_UNIT_TESTS: "OFF"
  BUILD_BENCHMARKS: "OFF"
  BUILD_GUI: "ON"
  BUILD_WEBRTC: "OFF"
  BUILD_JUPYTER_EXTENSION: "OFF"
  BUILD_TENSORFLOW_OPS: "OFF"
  BUILD_PYTORCH_OPS: "OFF"
  BUNDLE_OPEN3D_ML: "OFF"
  USE_BLAS: "OFF"
  USE_SYSTEM_BLAS: "OFF"
  STATIC_WINDOWS_RUNTIME: "OFF"
  PYTHON_VERSIONS: "3.10 3.11 3.12 3.13 3.14"
  BUILD_TYPE: "Release"

jobs:
  windows-cpu-build:
    name: "windows-x64-cpu-3.14"
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      CMAKE_GENERATOR: "Ninja"
      Python_ROOT_DIR: "C:/hostedtoolcache/windows/Python/3.14/x64"

    steps:
      # 1. Checkout repository (with submodules)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 2. Install Python (Chocolatey) and add to PATH
      - name: Install Python via Chocolatey
        run: choco install python314 --no-progress -y

      - name: Add Python to PATH
        run: |
          $p = "${{ env.Python_ROOT_DIR }}"
          "$p" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$p/Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # 3. Verify Python
      - name: Verify Python
        run: |
          python --version
          pip --version

      # 4. Cache VS Build Tools (install once, restore on subsequent runs)
      - name: Cache VS Build Tools
        id: cache-vs
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools
            C:\Program Files\Microsoft Visual Studio\2022\BuildTools
          key: vs-buildtools-${{ runner.os }}-${{ hashFiles('.github/workflows/windows-cpu.yml') }}
          restore-keys: |
            vs-buildtools-${{ runner.os }}-

      - name: Install VS Build Tools (if not cached)
        if: steps.cache-vs.outputs.cache-hit != 'true'
        run: |
          choco install visualstudio2022buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools `
            --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            --add Microsoft.VisualStudio.Component.VC.Runtime.x64 `
            --add Microsoft.VisualStudio.Component.Windows11SDK --includeRecommended" `
            --no-progress -y

      # Install ISPC compiler (required for Open3D ISPC kernels) and add to PATH
      - name: Install ISPC
        run: |
          # Use ISPC 1.20.0 which includes ispc_isas.exe
          $ispcVersion = "1.20.0"
          $url = "https://github.com/ispc/ispc/releases/download/v$ispcVersion/ispc-v$ispcVersion-windows.zip"
          Write-Host "Downloading ISPC $ispcVersion from: $url"
          $zipPath = "$env:TEMP\ispc.zip"
          $extractPath = "$env:TEMP\ispc"
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          # Find ispc_isas.exe and add its directory to PATH
          $ispcExe = Get-ChildItem $extractPath -Recurse -File -Filter "ispc_isas.exe" | Select-Object -First 1
          if ($ispcExe) {
            $dir = $ispcExe.DirectoryName
            "$dir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Added ISPC to PATH: $dir"
          } else {
            Write-Error "ispc_isas.exe not found in extracted archive"
            exit 1
          }

      # 5. Setup MSVC environment, PATH (cl.exe, rc.exe) and LIB paths
      - name: Setup MSVC environment
        run: |
          # Find VS installation
          $vsInstallDir = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools"
          if (-not (Test-Path $vsInstallDir)) { $vsInstallDir = "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools" }

          # Add MSVC cl.exe to PATH
          $msvcPath = Join-Path $vsInstallDir "VC\Tools\MSVC"
          if (Test-Path $msvcPath) {
            $latest = Get-ChildItem $msvcPath -Directory | Sort-Object Name -Descending | Select-Object -First 1
            $vcvars = Join-Path $latest.FullName "bin\Hostx64\x64"
            if (Test-Path $vcvars) {
              "$vcvars" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Write-Host "Added MSVC to PATH: $vcvars"
            }
          }

          # Save vcvarsall path for CMake step
          $vcvarsAll = Join-Path $vsInstallDir "VC\Auxiliary\Build\vcvarsall.bat"
          if (Test-Path $vcvarsAll) {
            "VCVARSALL_PATH=$vcvarsAll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          # Add Windows SDK (rc.exe) to PATH
          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          if (Test-Path "$sdkRoot\bin") {
            $sdkVer = Get-ChildItem "$sdkRoot\bin" -Directory | Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending | Select-Object -First 1
            if ($sdkVer) {
              $rcPath = "$sdkRoot\bin\$($sdkVer.Name)\x64"
              if (Test-Path $rcPath) { "$rcPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append }
            }
          }

      # 6. Configure CMake (same shell: vcvarsall → LIB paths → cmake)
      - name: Configure CMake
        run: |
          # Setup MSVC env
          $vcvarsAll = $env:VCVARSALL_PATH
          if (-not $vcvarsAll -or -not (Test-Path $vcvarsAll)) { Write-Error "vcvarsall not found"; exit 1 }
          & $vcvarsAll x64

          # Explicitly add SDK/MSVC/UCRT libs to LIB
          $sdkLibRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\Lib"
          if (Test-Path $sdkLibRoot) {
            $sdkVer = Get-ChildItem $sdkLibRoot -Directory | Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending | Select-Object -First 1
            if ($sdkVer) {
              $env:LIB = "$sdkLibRoot\$($sdkVer.Name)\ucrt\x64;$sdkLibRoot\$($sdkVer.Name)\um\x64;$env:LIB"
              $vsInstallDir = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools"
              if (-not (Test-Path $vsInstallDir)) { $vsInstallDir = "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools" }
              $msvcPath = Join-Path $vsInstallDir "VC\Tools\MSVC"
              if (Test-Path $msvcPath) {
                $latest = Get-ChildItem $msvcPath -Directory | Sort-Object Name -Descending | Select-Object -First 1
                $env:LIB = "$($latest.FullName)\lib\x64;$env:LIB"
              }
            }
          }
          Write-Host "Final LIB: $env:LIB"

          # CMake configure
          cmake -S . -B build `
            -G "${{ env.CMAKE_GENERATOR }}" `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX=install `
            -DDEVELOPER_BUILD=${{ env.DEVELOPER_BUILD }} `
            -DBUILD_CUDA_MODULE=${{ env.BUILD_CUDA_MODULE }} `
            -DBUILD_COMMON_CUDA_ARCHS=${{ env.BUILD_COMMON_CUDA_ARCHS }} `
            -DBUILD_SHARED_LIBS=${{ env.BUILD_SHARED_LIBS }} `
            -DBUILD_PYTHON_MODULE=${{ env.BUILD_PYTHON_MODULE }} `
            -DBUILD_EXAMPLES=${{ env.BUILD_EXAMPLES }} `
            -DBUILD_UNIT_TESTS=${{ env.BUILD_UNIT_TESTS }} `
            -DBUILD_BENCHMARKS=${{ env.BUILD_BENCHMARKS }} `
            -DBUILD_GUI=${{ env.BUILD_GUI }} `
            -DBUILD_WEBRTC=${{ env.BUILD_WEBRTC }} `
            -DBUILD_JUPYTER_EXTENSION=${{ env.BUILD_JUPYTER_EXTENSION }} `
            -DBUILD_TENSORFLOW_OPS=${{ env.BUILD_TENSORFLOW_OPS }} `
            -DBUILD_PYTORCH_OPS=${{ env.BUILD_PYTORCH_OPS }} `
            -DBUNDLE_OPEN3D_ML=${{ env.BUNDLE_OPEN3D_ML }} `
            -DUSE_BLAS=${{ env.USE_BLAS }} `
            -DUSE_SYSTEM_BLAS=${{ env.USE_SYSTEM_BLAS }} `
            -DSTATIC_WINDOWS_RUNTIME=${{ env.STATIC_WINDOWS_RUNTIME }} `
            -DPython3_ROOT_DIR="${{ env.Python_ROOT_DIR }}" `
            -DPython3_FIND_REGISTRY=NEVER

      # 7. Build wheel (cmake target pip-package handles core + pybind + wheel)
      - name: Build wheel
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --target pip-package -- -j4
        env:
          PYTHON_EXECUTABLE: ${{ env.Python_ROOT_DIR }}/python.exe

      # 8. Test wheel installation
      - name: Test wheel installation
        run: |
          $wheel = Get-ChildItem build/lib/python_package/pip_package/*.whl
          pip install $wheel.FullName
          python -c "import open3d as o3d; print('Open3D version:', o3d.__version__)"

      # 9. Upload wheel artifact
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: open3d-wheel-windows-x64-cpu-3.14
          path: build/lib/python_package/pip_package/*.whl
          retention-days: 30
          if-no-files-found: error

  release-wheels:
    name: "Release Wheels"
    needs: windows-cpu-build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: open3d-wheel-windows-x64-cpu-*
          merge-multiple: true

      - name: List wheels
        run: find wheels -name "*.whl" -type f | sort

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: wheels/*.whl
          generate_release_notes: true
          draft: false
          prerelease: false