# Windows x64 Cross-Compiled CPU Release Wheel (Linux core -> Windows wheel)
name: "Windows x64 Cross-Compile CPU Release Wheel"

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to build'
        required: false
        type: string
      build_type:
        description: 'Build type'
        required: false
        type: choice
        options: [Release, Debug]
        default: 'Release'

permissions:
  contents: read
  packages: write

env:
  DEVELOPER_BUILD: "OFF"
  BUILD_CUDA_MODULE: "OFF"
  BUILD_COMMON_CUDA_ARCHS: "OFF"
  BUILD_SHARED_LIBS: "OFF"
  BUILD_PYTHON_MODULE: "OFF"
  BUILD_EXAMPLES: "OFF"
  BUILD_UNIT_TESTS: "OFF"
  BUILD_BENCHMARKS: "OFF"
  BUILD_GUI: "OFF"
  BUILD_WEBRTC: "OFF"
  BUILD_JUPYTER_EXTENSION: "OFF"
  BUILD_TENSORFLOW_OPS: "OFF"
  BUILD_PYTORCH_OPS: "OFF"
  BUNDLE_OPEN3D_ML: "OFF"
  USE_BLAS: "ON"
  USE_SYSTEM_BLAS: "OFF"
  USE_SYSTEM_EIGEN3: "ON"
  USE_SYSTEM_FMT: "ON"
  USE_SYSTEM_GLEW: "OFF"
  USE_SYSTEM_GLFW: "OFF"
  USE_SYSTEM_IMGUI: "OFF"
  USE_SYSTEM_JSONCPP: "ON"
  USE_SYSTEM_TBB: "ON"
  USE_SYSTEM_TINYGLTF: "OFF"
  USE_SYSTEM_TINYOBJLOADER: "OFF"
  USE_SYSTEM_NANOFLANN: "OFF"
  USE_SYSTEM_STDGPU: "OFF"
  STATIC_WINDOWS_RUNTIME: "ON"
  PYTHON_VERSIONS: "3.10 3.11 3.12 3.13"
  BUILD_TYPE: "Release"

jobs:
  linux-cross-compile-core:
    name: "Linux Cross-Compile Core Library"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache MinGW-w64 and dependencies
        id: cache-mingw
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/x86_64-w64-mingw32-*
            /usr/bin/i686-w64-mingw32-*
            /usr/lib/gcc/x86_64-w64-mingw32
            /usr/lib/gcc/i686-w64-mingw32
            /usr/x86_64-w64-mingw32
            /usr/i686-w64-mingw32
            /usr/share/mingw-w64
            /usr/include/eigen3
            /usr/include/fmt
            /usr/include/jsoncpp
            /usr/include/tbb
            /usr/lib/x86_64-linux-gnu/libeigen3*
            /usr/lib/x86_64-linux-gnu/libfmt*
            /usr/lib/x86_64-linux-gnu/libjsoncpp*
            /usr/lib/x86_64-linux-gnu/libtbb*
          key: mingw-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/3rdparty/**/*.cmake') }}
          restore-keys: |
            mingw-deps-${{ runner.os }}-

      - name: Setup MinGW-w64 and dependencies
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mingw-w64 \
            mingw-w64-tools \
            gfortran-mingw-w64 \
            cmake \
            ninja-build \
            libeigen3-dev \
            libfmt-dev \
            libjsoncpp-dev \
            libtbb-dev

      - name: Cache OpenBLAS build
        id: cache-openblas
        uses: actions/cache@v4
        with:
          path: |
            build-mingw64/openblas-prefix/src/openblas-build
            build-mingw64/openblas-prefix/src/openblas-stamp
            install/lib/libopenblas.a
            install/include/openblas
          key: openblas-build-${{ runner.os }}-${{ hashFiles('3rdparty/openblas/openblas.cmake') }}
          restore-keys: |
            openblas-build-${{ runner.os }}-

      - name: Restore 3rdparty build cache
        id: cache-3rdparty
        uses: actions/cache@v4
        with:
          path: |
            build-mingw64/*-prefix/src/*-build
            build-mingw64/*-prefix/src/*-stamp
            install/lib
            install/include
          key: mingw64-3rdparty-${{ runner.os }}-${{ hashFiles('3rdparty/**/*.cmake', 'cmake/toolchain-mingw64.cmake') }}
          restore-keys: |
            mingw64-3rdparty-${{ runner.os }}-

      - name: Configure CMake (Cross-compile core library only)
        run: |
          cmake -S . -B build-mingw64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=install \
            -DCMAKE_GENERATOR=Ninja \
            -DDEVELOPER_BUILD=${{ env.DEVELOPER_BUILD }} \
            -DBUILD_CUDA_MODULE=${{ env.BUILD_CUDA_MODULE }} \
            -DBUILD_COMMON_CUDA_ARCHS=${{ env.BUILD_COMMON_CUDA_ARCHS }} \
            -DBUILD_SHARED_LIBS=${{ env.BUILD_SHARED_LIBS }} \
            -DBUILD_PYTHON_MODULE=${{ env.BUILD_PYTHON_MODULE }} \
            -DBUILD_EXAMPLES=${{ env.BUILD_EXAMPLES }} \
            -DBUILD_UNIT_TESTS=${{ env.BUILD_UNIT_TESTS }} \
            -DBUILD_BENCHMARKS=${{ env.BUILD_BENCHMARKS }} \
            -DBUILD_GUI=${{ env.BUILD_GUI }} \
            -DBUILD_WEBRTC=${{ env.BUILD_WEBRTC }} \
            -DBUILD_JUPYTER_EXTENSION=${{ env.BUILD_JUPYTER_EXTENSION }} \
            -DBUILD_TENSORFLOW_OPS=${{ env.BUILD_TENSORFLOW_OPS }} \
            -DBUILD_PYTORCH_OPS=${{ env.BUILD_PYTORCH_OPS }} \
            -DBUNDLE_OPEN3D_ML=${{ env.BUNDLE_OPEN3D_ML }} \
            -DBUILD_ISPC_MODULE=OFF \
            -DBUILD_SYCL_MODULE=OFF \
            -DWITH_IPP=OFF \
            -DUSE_BLAS=${{ env.USE_BLAS }} \
            -DUSE_SYSTEM_BLAS=${{ env.USE_SYSTEM_BLAS }} \
            -DUSE_SYSTEM_EIGEN3=${{ env.USE_SYSTEM_EIGEN3 }} \
            -DUSE_SYSTEM_FMT=${{ env.USE_SYSTEM_FMT }} \
            -DUSE_SYSTEM_GLEW=${{ env.USE_SYSTEM_GLEW }} \
            -DUSE_SYSTEM_GLFW=${{ env.USE_SYSTEM_GLFW }} \
            -DUSE_SYSTEM_IMGUI=${{ env.USE_SYSTEM_IMGUI }} \
            -DUSE_SYSTEM_JSONCPP=${{ env.USE_SYSTEM_JSONCPP }} \
            -DUSE_SYSTEM_TBB=${{ env.USE_SYSTEM_TBB }} \
            -DUSE_SYSTEM_TINYGLTF=${{ env.USE_SYSTEM_TINYGLTF }} \
            -DUSE_SYSTEM_TINYOBJLOADER=${{ env.USE_SYSTEM_TINYOBJLOADER }} \
            -DUSE_SYSTEM_NANOFLANN=${{ env.USE_SYSTEM_NANOFLANN }} \
            -DUSE_SYSTEM_STDGPU=${{ env.USE_SYSTEM_STDGPU }} \
            -DSTATIC_WINDOWS_RUNTIME=${{ env.STATIC_WINDOWS_RUNTIME }}

      - name: Build OpenBLAS first
        if: steps.cache-openblas.outputs.cache-hit != 'true'
        run: |
          cmake --build build-mingw64 --config ${{ env.BUILD_TYPE }} --target ext_openblas -- -j$(nproc)

      - name: Build other 3rdparty dependencies
        if: steps.cache-3rdparty.outputs.cache-hit != 'true'
        run: |
          cmake --build build-mingw64 --config ${{ env.BUILD_TYPE }} --target \
            ext_glfw ext_tinygltf ext_tinyobjloader ext_nanoflann \
            ext_zlib ext_libpng ext_turbojpeg ext_jsoncpp ext_boringssl ext_curl -- -j$(nproc)

      - name: Build Open3D Core Library
        run: |
          cmake --build build-mingw64 --config ${{ env.BUILD_TYPE }} -- -j$(nproc)

      - name: Install to staging directory
        run: |
          cmake --install build-mingw64 --prefix install

      - name: Upload core library artifact
        uses: actions/upload-artifact@v4
        with:
          name: open3d-core-windows-x64
          path: install/
          retention-days: 30
          if-no-files-found: error

  windows-build-wheel:
    name: "Build Wheel on Windows"
    needs: linux-cross-compile-core
    runs-on: windows-2022
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python_version: [3.11, 3.12, 3.13]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download core library artifact
        uses: actions/download-artifact@v4
        with:
          path: open3d-install
          pattern: open3d-core-windows-x64
          merge-multiple: true

      - name: List installed files
        run: |
          Get-ChildItem open3d-install -Recurse | Select-Object FullName, Length

      - name: Install Python
        run: |
          choco install python${{ matrix.python_version }} --no-progress -y
          $pythonPath = "C:/hostedtoolcache/windows/Python/${{ matrix.python_version }}/x64"
          echo "$pythonPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$pythonPath/Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Python
        run: |
          python --version
          pip --version

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install cmake ninja setuptools wheel

      - name: Configure CMake (Build wheel using prebuilt core)
        run: |
          cmake -S . -B build ^
            -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
            -DCMAKE_INSTALL_PREFIX=install ^
            -DDEVELOPER_BUILD=${{ env.DEVELOPER_BUILD }} ^
            -DBUILD_CUDA_MODULE=${{ env.BUILD_CUDA_MODULE }} ^
            -DBUILD_COMMON_CUDA_ARCHS=${{ env.BUILD_COMMON_CUDA_ARCHS }} ^
            -DBUILD_SHARED_LIBS=ON ^
            -DBUILD_PYTHON_MODULE=ON ^
            -DBUILD_EXAMPLES=${{ env.BUILD_EXAMPLES }} ^
            -DBUILD_UNIT_TESTS=${{ env.BUILD_UNIT_TESTS }} ^
            -DBUILD_BENCHMARKS=${{ env.BUILD_BENCHMARKS }} ^
            -DBUILD_GUI=${{ env.BUILD_GUI }} ^
            -DBUILD_WEBRTC=${{ env.BUILD_WEBRTC }} ^
            -DBUILD_JUPYTER_EXTENSION=${{ env.BUILD_JUPYTER_EXTENSION }} ^
            -DBUILD_TENSORFLOW_OPS=${{ env.BUILD_TENSORFLOW_OPS }} ^
            -DBUILD_PYTORCH_OPS=${{ env.BUILD_PYTORCH_OPS }} ^
            -DBUNDLE_OPEN3D_ML=${{ env.BUNDLE_OPEN3D_ML }} ^
            -DUSE_BLAS=${{ env.USE_BLAS }} ^
            -DUSE_SYSTEM_BLAS=${{ env.USE_SYSTEM_BLAS }} ^
            -DSTATIC_WINDOWS_RUNTIME=${{ env.STATIC_WINDOWS_RUNTIME }} ^
            -DOPEN3D_USE_INSTALLED_LIBRARY=ON ^
            -DOpen3D_DIR="${{ github.workspace }}/open3d-install/lib/cmake/Open3D" ^
            -DPython3_ROOT_DIR="C:/hostedtoolcache/windows/Python/${{ matrix.python_version }}/x64"

      - name: Build Python Wheel
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --target pip-package -- -j4
        env:
          PYTHON_EXECUTABLE: "C:/hostedtoolcache/windows/Python/${{ matrix.python_version }}/x64/python.exe"

      - name: Verify wheel
        run: |
          $wheel = Get-ChildItem build/lib/python_package/pip_package -Filter "*.whl" | Select-Object -First 1
          Write-Host "Found wheel: $($wheel.Name)"
          pip install $wheel.FullName
          python -c "import open3d as o3d; print('Open3D version:', o3d.__version__); print('CUDA available:', o3d.core.cuda.is_available())"

      - name: Run basic tests
        run: |
          python -c "
          import open3d as o3d
          import numpy as np
          
          # Test core functionality
          pcd = o3d.geometry.PointCloud()
          pcd.points = o3d.utility.Vector3dVector(np.random.rand(100, 3))
          print('PointCloud created:', len(pcd.points))
          
          # Test tensor operations
          tensor = o3d.core.Tensor([1, 2, 3])
          print('Tensor created:', tensor)
          
          # Test visualization (headless)
          vis = o3d.visualization.Visualizer()
          vis.create_window(visible=False)
          vis.destroy_window()
          print('Visualization test passed')
          
          print('All basic tests passed!')
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: open3d-wheel-windows-x64-${{ matrix.python_version }}
          path: build/lib/python_package/pip_package/*.whl
          retention-days: 30
          if-no-files-found: error

  release-wheels:
    name: "Release Wheels"
    needs: [linux-cross-compile-core, windows-build-wheel]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: open3d-wheel-windows-x64-*
          merge-multiple: true

      - name: List all wheels
        run: find wheels -name "*.whl" -type f | sort

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: wheels/*.whl
          generate_release_notes: true
          draft: false
          prerelease: false